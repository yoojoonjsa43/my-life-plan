<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>왕자의 동그란 마법창</title>
    <style>
        body { text-align: center; padding-top: 50px; font-family: sans-serif; background-color: #f0f0f0; }
        
        /* [핵심] 입력창을 동그랗게 만드는 디자인 */
        #starCount { 
            width: 80px;         /* 가로 길이 */
            height: 80px;        /* 세로 길이를 가로와 똑같이 */
            border-radius: 50%;  /* [중요] 모서리를 50% 깎으면 완벽한 원이 됩니다 */
            border: 4px solid #f1c40f; 
            font-size: 24px; 
            text-align: center; 
            outline: none;       /* 클릭했을 때 생기는 테두리 제거 */
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        #starCount:focus { background-color: #fff9e6; transform: scale(1.1); }

        button { 
            display: block; margin: 30px auto; 
            padding: 12px 25px; font-size: 18px; 
            cursor: pointer; background: #333; color: white; 
            border: none; border-radius: 30px; 
        }
        #result { font-size: 24px; color: #f39c12; }
    </style>
</head>
<body>

    <h1>운명의 숫자를 적으세요</h1>
    
    <input type="number" id="starCount" value="5">

    <button onclick="drawStars()">별 쏟아붓기!</button>

    <div id="result"></div>

    <script>
        function drawStars() {
            let count = document.getElementById('starCount').value;
            let stars = "";
            for (let i = 0; i < count; i++) {
                stars += "⭐";
            }
            document.getElementById('result').innerHTML = stars;
        }
    </script>

</body>
</html>
